services:
  oracle-xe:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-xe-db
    env_file:
      - .env
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./scripts:/scripts
    ports:
      - ${DB_PORT:-1521}:1521
      - ${ORACLE_EM_PORT:-5500}:5500
    environment:
      - ORACLE_SID=${ORACLE_SID:-XE}
      - ORACLE_PWD=${ORACLE_PWD:-password123}
      - STAGEUPDBA=${STAGEUPDBA:-C##STAGEUPDBA}
      - STAGEUPDBA_PWD=${STAGEUPDBA_PWD:-stageupdba}
    command: |
      bash -c "
        /opt/oracle/runOracle.sh &

        sleep 60 

        # Run each of your scripts in sequence
        sqlplus -S system/$$ORACLE_PWD@$$ORACLE_SID @/scripts/00_stageupdba.sql
        sqlplus -S $$STAGEUPDBA/$$STAGEUPDBA_PWD@$$ORACLE_SID @/scripts/01_types.sql
        sqlplus -S $$STAGEUPDBA/$$STAGEUPDBA_PWD@$$ORACLE_SID @/scripts/02_tables.sql
        sqlplus -S $$STAGEUPDBA/$$STAGEUPDBA_PWD@$$ORACLE_SID @/scripts/03_indexes.sql
        sqlplus -S $$STAGEUPDBA/$$STAGEUPDBA_PWD@$$ORACLE_SID @/scripts/05_views.sql
        sqlplus -S $$STAGEUPDBA/$$STAGEUPDBA_PWD@$$ORACLE_SID @/scripts/06_populatedb.sql
        sqlplus -S $$STAGEUPDBA/$$STAGEUPDBA_PWD@$$ORACLE_SID @/scripts/04_triggers.sql
        wait $$!
      "

volumes:
  oracle-data:
    driver: local
